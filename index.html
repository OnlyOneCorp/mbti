  .screen{width:100%;display:none;animation:rise .4s ease;}

  .hero{text-align:center;padding:18px 0 8px;}

  .blob.b1{width:26px;height:26px;background:#ffc7d6;top:8px;left:6px;}

  .rnick{font-size:20px;font-weight:700;margin:4px 0 16px;}
  .rdesc{color:var(--ink-soft);font-size:15.5px;margin-bottom:24px;}
  .blood{background:#f6f5f2;border-radius:16px;padding:16px 18px;margin-bottom:24px;}
  .blood .bt{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:4px;}
  .blood .bv{font-size:24px;font-weight:800;}
  .blood .bl{font-size:13.5px;color:var(--ink-soft);margin-top:6px;font-style:italic;}
  .reco{border-top:1px solid var(--line);padding-top:22px;margin-bottom:6px;}
  .reco .rl{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:10px;}
  .reco .ri{font-size:16px;font-weight:700;margin-bottom:14px;}
  .aff{display:flex;flex-direction:column;gap:10px;}
  .aff a{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;padding:13px;font-size:15px;font-weight:700;text-decoration:none;transition:.15s;}

  .aff .coupang{background:#3a4a9f;color:#fff;}
  .aff .amazon{background:#ff9900;color:#1a1a1a;}

  .ractions{display:flex;flex-direction:column;gap:12px;margin-top:22px;width:100%;}

  /* Footer */

  footer a{color:var(--ink-soft);}
  .disc{margin-top:10px;font-size:11.5px;color:#9aa0a6;}

  /* Consent banner */
  .consent{
    position:fixed;left:14px;right:14px;bottom:14px;z-index:100;
    background:#fff;border:1px solid var(--line);border-radius:20px;
    box-shadow:0 12px 50px rgba(40,44,48,.16);padding:20px 22px;
    max-width:520px;margin:0 auto;display:none;animation:rise .35s ease;
  }
  .consent.on{display:block;}
  .consent p{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6;}
  .consent .cbtns{display:flex;gap:10px;}
  .consent button{flex:1;border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:none;}
  .consent .accept{background:var(--ink);color:#fff;}
  .consent .decline{background:#f0efec;color:var(--ink);}

  @media(max-width:420px){
    .hero h1{font-size:27px;}
    .rtype{font-size:46px;}
    .qsit{font-size:19px;}
  }
</style>
</head>

/* ============ Questions (5 per dimension) ============ */
const Q = [

/* ============ Per-type emoji ============ */
const EMOJI={ISTJ:'📋',ISFJ:'🛡️',INFJ:'🔮',INTJ:'♟️',ISTP:'🔧',ISFP:'🎨',INFP:'🌙',INTP:'🧪',ESTP:'🏍️',ESFP:'🎉',ENFP:'✨',ENTP:'💬',ESTJ:'📊',ESFJ:'☕',ENFJ:'🤝',ENTJ:'🚀'};

/* ============ State ============ */
let lang = localStorage.getItem('oo_lang') || 'ko';
let idx = 0;
let order = [], step = 0, picks = [];
let score = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

const $ = id => document.getElementById(id);

/* ---- Language ---- */
function applyLang(){
  document.documentElement.lang = lang;
  $('langBtn').textContent = lang === 'ko' ? 'EN' : '한국어';
  document.querySelectorAll('[data-ko]').forEach(el=>{
    el.textContent = el.getAttribute('data-'+lang);
  });
  // affiliate disclosure scoping
  $('discCoupang').style.display = lang === 'ko' ? 'block' : 'none';
  $('discAmazon').style.display  = lang === 'en' ? 'block' : 'none';
  // re-render current question / result if visible
  if($('quiz').classList.contains('on')) renderQ();
  if($('result').classList.contains('on')) renderResult(currentType);
}
$('langBtn').onclick = ()=>{
  lang = lang === 'ko' ? 'en' : 'ko';
  localStorage.setItem('oo_lang', lang);
  applyLang();
};

/* ---- Screens ---- */
function show(id){
  ['intro','quiz','result'].forEach(s=>$(s).classList.toggle('on', s===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---- Quiz ---- */
function shuffle(n){
  const a=[...Array(n).keys()];
  for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function curQ(){ return Q[order[step]]; }
function renderQ(){
  const q = curQ();
  $('bar').style.width = (step/Q.length*100)+'%';
  $('qcount').textContent = (lang==='ko'?'질문 ':'Question ')+(step+1)+' / '+Q.length;
  $('qsit').textContent = q[lang];
  $('qex').textContent = EX[order[step]][lang];
  $('optA').textContent = q.a[lang];
  $('optB').textContent = q.b[lang];
  $('backBtn').style.visibility = step>0 ? 'visible' : 'hidden';
}
function pick(opt){
  picks.push(opt.l);
  score[opt.l]++;
  step++;
  if(step < Q.length){ renderQ(); }
  else { finish(); }
}
$('optA').onclick = ()=>pick(curQ().a);
$('optB').onclick = ()=>pick(curQ().b);
$('backBtn').onclick = ()=>{
  if(step>0){ step--; const l=picks.pop(); score[l]--; renderQ(); }
};

$('startBtn').onclick = ()=>{
  order = shuffle(Q.length); step = 0; picks = [];
  score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  show('quiz'); renderQ();
  if(window.gtag) gtag('event','start_quiz');
};

/* ---- Result ---- */
let currentType = 'ISTJ';
function calcType(){
  return (score.E>=score.I?'E':'I')+(score.S>=score.N?'S':'N')+
         (score.T>=score.F?'T':'F')+(score.J>=score.P?'J':'P');
}
function renderResult(t){
  const d = TYPES[t];
  $('remoji').textContent = EMOJI[t] || '🧩';
  $('rtype').textContent = t;
  $('rnick').textContent = d.nick[lang];
  $('rdesc').textContent = d.desc[lang];
  $('bloodVal').textContent = (lang==='ko'? d.blood+'형' : d.blood+' type');
  $('bloodLine').textContent = '“'+d.bl[lang]+'”';
  $('recoItem').textContent = d.item[lang];
  $('coupangBtn').href = COUPANG_URL;
  $('amazonBtn').href  = AMAZON_URL;
  // affiliate button scoping: Coupang for KO, Amazon for EN
  $('coupangBtn').style.display = lang==='ko' ? 'flex' : 'none';
  $('amazonBtn').style.display  = lang==='en' ? 'flex' : 'none';
}
var CAN_HISTORY = (function(){
  try{ return window.self === window.top && /^https?:/.test(location.protocol); }
  catch(e){ return false; }
})();
function setUrl(t){
  if(!CAN_HISTORY) return;
  try{ history.replaceState(null,'', t ? '?t='+t : location.pathname); }catch(e){}
}
function finish(){
  currentType = calcType();
  $('bar').style.width = '100%';
  renderResult(currentType);
  show('result');
  setUrl(currentType);
  if(window.gtag) gtag('event','result',{mbti:currentType});
}

$('retryBtn').onclick = ()=>{ setUrl(null); show('intro'); };

/* ---- Canvas result card (save / share) ---- */
function rrect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function wrapText(x,t,cx,y,maxW,lh){
  const words=t.split(' ');let line='',yy=y;
  for(const w of words){const test=line+w+' ';
    if(x.measureText(test).width>maxW && line){x.fillText(line.trim(),cx,yy);line=w+' ';yy+=lh;}
    else line=test;}
  x.fillText(line.trim(),cx,yy);return yy;
}
function drawLogo(x,cx,cy,s){
  x.strokeStyle='#3D4248';x.lineWidth=s*0.46;x.beginPath();x.arc(cx,cy,s,0,Math.PI*2);x.stroke();
  x.fillStyle='#3D4248';rrect(x,cx-s*0.25,cy+s*0.7,s*0.5,s*1.5,s*0.25);x.fill();
}
function makeCard(){
  const t=currentType,d=TYPES[t],W=1080,H=1350;

  const ay=400,g=x.createRadialGradient(cx,ay,20,cx,ay,280);
  g.addColorStop(0,'rgba(255,209,227,.85)');g.addColorStop(.45,'rgba(214,236,255,.55)');
  g.addColorStop(.75,'rgba(218,251,228,.35)');g.addColorStop(1,'rgba(250,250,248,0)');
  x.fillStyle=g;x.beginPath();x.arc(cx,ay,280,0,Math.PI*2);x.fill();
  // emoji
  x.textAlign='center';x.textBaseline='middle';
  x.font='190px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  x.fillText(EMOJI[t]||'🧩',cx,ay);
  // type
  x.fillStyle='#3D4248';x.font='800 160px Pretendard,sans-serif';x.fillText(t,cx,690);
  // nickname
  x.font='700 56px Pretendard,sans-serif';x.fillText(d.nick[lang],cx,790);
  // desc
  x.fillStyle='#6b7178';x.font='400 40px Pretendard,sans-serif';
  wrapText(x,d.desc[lang],cx,880,840,56);
  // blood pill
  x.fillStyle='#f0efec';rrect(x,cx-260,1010,520,170,34);x.fill();
  x.fillStyle='#3D4248';x.font='800 64px Pretendard,sans-serif';
  x.fillText((lang==='ko'?d.blood+'형':d.blood+' type'),cx,1075);
  x.fillStyle='#8a9099';x.font='italic 32px Pretendard,sans-serif';
  x.fillText(lang==='ko'?'혈액형 유추 · 재미로만!':'blood guess · just for fun!',cx,1135);
  // footer brand
  drawLogo(x,cx-150,1255,30);
  x.textAlign='left';x.fillStyle='#3D4248';x.font='800 52px Pretendard,sans-serif';
  x.fillText('OnlyOne',cx-95,1278);
  x.textAlign='center';x.fillStyle='#9aa0a6';x.font='400 30px Pretendard,sans-serif';
  x.fillText(lang==='ko'?'케바케 MBTI':'MBTI IRL',cx,1320);
  return c;
}
function shareText(){
  return lang==='ko'
    ? `내 케바케 MBTI는 ${currentType} (${TYPES[currentType].nick.ko})! 너도 해봐 👇`
    : `My MBTI IRL is ${currentType} (${TYPES[currentType].nick.en})! Try it 👇`;
}
function shareUrl(){
  try{ if(CAN_HISTORY) return location.origin+location.pathname+'?t='+currentType; }catch(e){}
  return 'https://main.onlyonecorpceo.workers.dev';
}
$('saveBtn').onclick = ()=>{
  makeCard().toBlob(b=>{
    const u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='OnlyOne_'+currentType+'.png';a.click();
    setTimeout(()=>URL.revokeObjectURL(u),1500);
  },'image/png');
  if(window.gtag) gtag('event','save_card',{mbti:currentType});
};
$('shareBtn').onclick = ()=>{
  const text=shareText(),url=shareUrl();
  makeCard().toBlob(async b=>{
    const file=new File([b],'OnlyOne_'+currentType+'.png',{type:'image/png'});
    try{
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text,title:'케바케 MBTI · MBTI IRL'});
      }else if(navigator.share){
        await navigator.share({text,url,title:'케바케 MBTI · MBTI IRL'});
      }else{
        await navigator.clipboard.writeText(text+' '+url);
        alert(lang==='ko'?'링크가 복사됐어요!':'Link copied!');
      }
    }catch(e){}
  },'image/png');
  if(window.gtag) gtag('event','share',{mbti:currentType});
};

/* ---- Shared result deep-link (?t=ENFP) ---- */
(function(){
  const t = new URLSearchParams(location.search).get('t');
  if(t && TYPES[t.toUpperCase()]){
    currentType = t.toUpperCase();
    renderResult(currentType);
    show('result');
  }
})();

/* ============ Consent Mode v2 ============ */
function grant(){
  gtag('consent','update',{
    ad_storage:'granted', ad_user_data:'granted',
    ad_personalization:'granted', analytics_storage:'granted'
  });
}
(function(){
  const c = localStorage.getItem('oo_consent');
  if(c === 'granted'){ grant(); }
  else if(c !== 'declined'){ $('consent').classList.add('on'); }
})();
$('acceptBtn').onclick = ()=>{ localStorage.setItem('oo_consent','granted'); grant(); $('consent').classList.remove('on'); };
$('declineBtn').onclick = ()=>{ localStorage.setItem('oo_consent','declined'); $('consent').classList.remove('on'); };

/* ---- init ---- */
applyLang();
</script>
</body>
</html>
